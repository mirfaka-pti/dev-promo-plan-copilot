<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Promo Plan</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js" defer></script>

    <style>
        body {
            font-family: Segoe UI, Arial, sans-serif;
            padding: 16px;
        }

        .error {
            color: #b00020;
            border: 1px solid #b00020;
            background: #fff5f5;
            padding: 12px;
            border-radius: 6px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        select,
        button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #106ebe;
        }

        #app {
            display: none;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #107c10;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            opacity: 0;
            transition: all .3s ease;
            transform: translateY(20px);
            pointer-events: none;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div id="errorContainer"></div>

    <div id="app">

        <h3>Promo Plan</h3>

        <div class="form-group">
            <label>Sheet Name</label>
            <select id="sheetName"></select>
        </div>

        <div class="form-group">
            <label>Brand</label>
            <select id="brand">
                <option value="BEYONDLY">BEYONDLY</option>
                <option value="BIODEF">BIODEF</option>
                <option value="BRIGHT NOW">BRIGHT NOW</option>
                <option value="CRYSTALLURE">CRYSTALLURE</option>
                <option value="EARTH">EARTH</option>
                <option value="EMINA">EMINA</option>
                <option value="INSTAPERFECT">INSTAPERFECT</option>
                <option value="KAHF">KAHF</option>
                <option value="KAHF PERFUME">KAHF PERFUME</option>
                <option value="LABORE">LABORE</option>
                <option value="LIGHT PLUS">LIGHT PLUS</option>
                <option value="MAKE OVER">MAKE OVER</option>
                <option value="OMG">OMG</option>
                <option value="PUTRI">PUTRI</option>
                <option value="TAVI">TAVI</option>
                <option value="WARDAH">WARDAH</option>
                <option value="WARDAH DE">WARDAH DE</option>
            </select>
        </div>

        <div class="form-group">
            <label>Promo Type</label>
            <select id="promoType">
                <option value="default">🌥️ BAU</option>
                <option value="payday">💰 Payday Only</option>
                <option value="peakday">🗓️ Peakday Only</option>
                <option value="flashsale">⚡ Flash Sale Only</option>
            </select>
        </div>

        <button id="btnCreateLog">
            Start Promo Plan
        </button>

    </div>

    <div id="toast" class="toast"></div>

</body>

</html>

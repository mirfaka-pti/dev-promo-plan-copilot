<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Promo Plan</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js" defer></script>

    <style>
        body {
            font-family: Segoe UI, Arial, sans-serif;
            padding: 16px;
        }

        .error {
            color: #b00020;
            border: 1px solid #b00020;
            padding: 12px;
            border-radius: 6px;
            background: #fff5f5;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #0078d4;
            color: white;
        }

        button:hover {
            background: #106ebe;
        }

        #app {
            display: none;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #107c10;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div id="errorContainer"></div>

    <div id="app">
        <h3>Promo Plan Automation</h3>

        <button id="btnCreateLog">
            Create Log
        </button>

        <div id="result" style="margin-top:12px;"></div>
    </div>

    <div id="toast" class="toast">
        Berhasil ditambahkan
    </div>

</body>

</html>
